# Netlify configuration for the Aman Yuk! Vite + React single-page app.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for any path so client-side routing keeps
# working on deep links and refreshes. (HashRouter already survives without
# this, but it future-proofs the app and covers direct asset-less paths.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (mirrors the project's existing Netlify conventions).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Vite emits content-hashed files in /assets — safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
